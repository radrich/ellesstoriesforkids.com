<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Story Time – Elle's Stories for Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffd5f4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Emoji Story Time" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #ffd5f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
      position: relative;
      padding: 16px 24px;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0.18;
      pointer-events: none;
    }

    @keyframes pop {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      65%  { transform: scale(1.2) rotate(4deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(50,89,255,0.4); }
      50%       { box-shadow: 0 4px 44px rgba(50,89,255,0.65); }
    }

    #logo {
      width: 120px;
      margin-bottom: 10px;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 700;
      color: #000;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 16px;
    }

    /* Cards: 4-in-a-row on wide screens, 2x2 on narrow */
    #cards {
      display: grid;
      grid-template-columns: repeat(4, 82px);
      gap: 12px;
      margin-bottom: 16px;
      justify-content: center;
    }

    @media (max-width: 420px) {
      #cards {
        grid-template-columns: repeat(2, 82px);
      }
    }

    .emoji-card {
      width: 82px;
      height: 82px;
      background: white;
      border: 2px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
      transition: transform 0.2s ease;
      cursor: default;
      user-select: none;
    }
    .emoji-card:hover { transform: scale(1.12) rotate(2deg); }

    #prompt-area {
      height: 36px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #prompt-text {
      color: #000;
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-style: italic;
      text-align: center;
      max-width: 380px;
      display: none;
    }

    #shuffling-text {
      color: rgba(0,0,0,0.4);
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: none;
    }

    #btn {
      padding: 15px 44px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #3259ff;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s ease;
      animation: softPulse 2.5s infinite;
      box-shadow: 0 4px 24px rgba(50,89,255,0.35);
    }
    #btn:hover { transform: scale(1.04) translateY(-2px); filter: brightness(1.1); }
    #btn:active { transform: scale(0.97); }
    #btn:disabled {
      background: rgba(50,89,255,0.3);
      color: rgba(0,0,0,0.4);
      cursor: not-allowed;
      animation: none;
    }

    #subtitle {
      color: rgba(0,0,0,0.5);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      margin-top: 14px;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }

    #counter {
      color: rgba(0,0,0,0.4);
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 600;
      margin-top: 14px;
      letter-spacing: 2px;
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    #tagline {
      color: rgba(0,0,0,0.35);
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      margin-top: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #site-link {
      color: #3259ff;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      margin-top: 10px;
      letter-spacing: 1px;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <script>
    const DOT_COLOURS = ["#3259ff","#ffcc00","#ff5757","#3259ff"];
    for (let i = 0; i < 20; i++) {
      const d = document.createElement("div");
      d.className = "dot";
      const size = (i % 4) + 2;
      d.style.width = size + "px";
      d.style.height = size + "px";
      d.style.background = DOT_COLOURS[i % 4];
      d.style.top = ((i * 41) % 100) + "%";
      d.style.left = ((i * 67) % 100) + "%";
      document.body.appendChild(d);
    }
  </script>

  <h1>Emoji Story Time</h1>

  <div id="cards">
    <div class="emoji-card">📖</div>
    <div class="emoji-card">📖</div>
    <div class="emoji-card">📖</div>
    <div class="emoji-card">📖</div>
  </div>

  <div id="prompt-area">
    <span id="prompt-text"></span>
    <span id="shuffling-text">Shuffling the story…</span>
  </div>

  <button id="btn" onclick="generate()">✦ Deal My Emojis ✦</button>

  <p id="subtitle">Deal four emojis. Make up a story that connects them all.</p>

  <p id="counter"></p>

  <p id="tagline">Every great tale needs a spark</p>

  <a id="site-link" href="https://www.ellesstoriesforkids.com/" target="_blank" rel="noopener noreferrer">
    Elle's Stories for Kids
  </a>

  <script>
    const EMOJIS = [
      "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵",
      "🐔","🐧","🐦","🦆","🦅","🦉","🦇","🐺","🐗","🐴","🦄","🐝","🐛","🦋","🐌",
      "🌸","🌺","🌻","🌹","🍀","🌿","🍄","🌵","🎋","🍁","🌊","🔥","⭐","🌙","☀️",
      "🍕","🍔","🍟","🌮","🍣","🍦","🍩","🎂","🍓","🍉","🍇","🍋","🥑","🌽","🥦",
      "🎸","🎹","🎺","🎻","🥁","🎮","🎲","🎯","🎪","🎨","🎭","🎬","🎤","🎧","🎡",
      "🚀","🛸","🌈","⚡","💫","🌀","❄️","🎃","🎄","🎆","🎇","✨","💥","🔮","🪄",
      "💎","👑","🏆","🎖️","🥇","🎀","🎁","🎊","🎉","🪅","🫧","🌟","💫","🔥","🌊"
    ];

    const PROMPTS = [
      "Once upon a time…","It all started when…","Nobody expected that…",
      "In a land far away…","On the strangest day…","They say it began with…",
      "Against all odds…","Deep in the woods…","Just before midnight…","The legend goes that…"
    ];

    let count = 0;
    let shuffling = false;

    function getUniqueRandom() {
      return [...EMOJIS].sort(() => Math.random() - 0.5).slice(0, 4);
    }

    function getPrompt() {
      return PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
    }

    function setCards(emojis, animate) {
      const cards = document.querySelectorAll(".emoji-card");
      cards.forEach((card, i) => {
        card.textContent = emojis[i];
        if (animate) {
          card.style.animation = "none";
          card.offsetHeight;
          card.style.animation = `pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) ${i * 0.08}s both`;
        }
      });
    }

    function generate() {
      if (shuffling) return;
      shuffling = true;

      const btn = document.getElementById("btn");
      const promptText = document.getElementById("prompt-text");
      const shufflingText = document.getElementById("shuffling-text");
      const tagline = document.getElementById("tagline");

      btn.disabled = true;
      btn.textContent = "Shuffling…";
      promptText.style.display = "none";
      shufflingText.style.display = "block";
      tagline.style.display = "none";

      let ticks = 0;
      const interval = setInterval(() => {
        setCards(getUniqueRandom(), false);
        ticks++;
        if (ticks > 12) {
          clearInterval(interval);
          setCards(getUniqueRandom(), true);

          shufflingText.style.display = "none";
          promptText.textContent = getPrompt();

          setTimeout(() => {
            promptText.style.display = "block";
            promptText.style.animation = "none";
            promptText.offsetHeight;
            promptText.style.animation = "fadeUp 0.5s ease both";
          }, 300);

          shuffling = false;
          count++;
          btn.disabled = false;
          btn.textContent = "✦ New Story ✦";

          const counter = document.getElementById("counter");
          counter.style.display = "block";
          counter.textContent = count + (count === 1 ? " STORY SPARKED" : " STORIES SPARKED");
        }
      }, 60);
    }
  </script>


  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
